version: "3.8"

services:
  netai-forecast-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NETAI_LOG_LEVEL=INFO
      - NETAI_METRIC=throughput_mbps
    volumes:
      - model-data:/app/models/saved
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  model-data:
