apiVersion: apps/v1
kind: Deployment
metadata:
  name: netai-forecast-api
  namespace: netai
  labels:
    app: netai-forecast
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netai-forecast
      component: api
  template:
    metadata:
      labels:
        app: netai-forecast
        component: api
    spec:
      containers:
        - name: forecast-api
          image: registry.nrp.ai/netai/forecast-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NETAI_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: model-storage
              mountPath: /app/models/saved
            - name: config
              mountPath: /app/configs/default_config.yaml
              subPath: default_config.yaml
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: netai-model-pvc
        - name: config
          configMap:
            name: netai-forecast-config
